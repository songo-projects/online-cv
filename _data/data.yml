career-profile:
  title: Career Profile
  summary: |
    I'm an enthusiastic, self-driven IT enthusiast with a lifelong passion 
    for technology, from building my first PC to independently designing 
    and deploying enterprise-grade network infrastructure for a real business. 
    I thrive on curiosity, constantly teaching myself new skills through 
    hands-on projects, research, and experimentation. Currently pursuing a Bachelor 
    of Science in Computing and Software Systems at the University of Melbourne, 
    I'm building a strong technical foundation while working toward a 
    future career in software engineering, AI, and cybersecurity. I aim to
    bring genuine enthusiasm and a refusal to stop learning to everything I do.
    
education:
  title: Education
  info:
  - degree: Bachelor of Science
    university: The University of Melbourne
    time: FEB 2026 - PRESENT
    details: |
      I'm currently studying a Bachelor of Science majoring in Computing and 
      Software Systems at the University of Melbourne, building a strong 
      foundation in programming, computational thinking, and software development.
      Beyond my degree, I plan to pursue a Master of Software Engineering, 
      specialising in either Artificial Intelligence or Cybersecurity, to 
      deepen my technical expertise in these emerging fields. Completed subjects include:

        - Foundations of Computing - Python programming, computational thinking,
        UTF encoding, numbering systems, and algorithm types, plus exposure to HTML,
        GitHub Copilot, and project-based development

        - Calculus 1 - differentiation, integration, and mathematical modelling to 
        solve real-world quantitative problems

        - Principles of Marketing - gaining an understanding of consumer 
        behaviour, market research, branding, and strategic marketing concepts
        
  - degree: Victorian Certificate of Education (VCE)
    university: Kew High School
    time: JAN 2020 - NOV 2025
    details: |
      Throughout my VCE at Kew High School, I developed leadership, communication, and 
      teamwork skills while expressing creativity across classes. Completing subjects 
      including Core English, Methods, General Mathematics, Physics, Business Management,
      and Applied Computing.
      
        - Developed a Python and Anvil web application to analyse sleep patterns by 
        designing, conducting, and evaluating survey data on human needs, sleep schedules,
        and sleep conditions
        
        - Built and programmed LEGO Mindstorms robots using Blockly for robotics and 
        automation projects.

        - Received a Certificate of Achievement for camera operation at Presentation 
        Night for three consecutive years (2021–2023)
        
experiences:
  title: Experiences
  info:
  - role: IT Support Technician (Work Experience)
    time: Jun 2023 - Jun 2023
    company: A2Z Infrastructure Solutions
    details: |
      Work experience at A2Z Infrastructure Solutions helped me gain my first real exposure
      to the world of IT support, building an understanding of helpdesk operations, IT policy,
      and networking infrastructure. This placement also introduced me to Active Directory,
      Microsoft 365 administration, and cybersecurity practices, sparking my interest in pursuing a career in IT. 
      
        - Learned helpdesk operations, ticketing/online support forms, and IT policy fundamentals
        
        - Gained knowledge of networking: VPN, SD-WAN, DHCP, Wi-Fi, IP addressing, DNS, VLANs, firewalls
        
        - Assisted with Active Directory tasks: creating/disabling user accounts, group policies, joining laptops to domain
        
        - Exposed to remote desktop support tools for troubleshooting end-user issues
        
        - Supported Microsoft 365 admin tasks: mailbox management, Outlook/email access, PST export
        
        - Participated in cybersecurity discussions: firewall setup, activity monitoring, business security requirements

